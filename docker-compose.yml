version: "3.8"

services:
  backend:
    build: ./back-end
    ports:
      - "3001:3001"
    env_file:
    - ./back-end/.env
    volumes:
      - ./back-end:/app
      

  frontend:
    build: ./front-end
    ports:
      - "5173:5173"
    env_file:
    - ./front-end/.env
    volumes:
      - ./front-end:/app